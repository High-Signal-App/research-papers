name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "AGENTS.md"
      - "STATUS.md"
      - "PROJECT_STATUS.md"
      - "README.md"
      - "DEPLOY.md"
      - "blume.config.ts"
      - "scripts/check-docs.sh"
      - "scripts/build-docs.sh"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "docs/**"
      - "AGENTS.md"
      - "STATUS.md"
      - "PROJECT_STATUS.md"
      - "README.md"
      - "DEPLOY.md"
      - "blume.config.ts"
      - "scripts/check-docs.sh"
      - "scripts/build-docs.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate docs (links + structure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docs
        run: |
          chmod +x scripts/check-docs.sh
          ./scripts/check-docs.sh

  # Optional Blume build smoke — verifies blume.config.ts is valid and the
  # docs/ tree builds into a static site. Skipped unless BUILD_BLUME=true
  # (workflow_dispatch) to avoid pulling Node on every docs touch.
  blume-build:
    name: Blume build smoke (opt-in)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && vars.BUILD_BLUME == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build Blume site
        run: |
          chmod +x scripts/build-docs.sh
          ./scripts/build-docs.sh
